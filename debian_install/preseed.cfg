# ========================
# 本地化与语言设置
# ========================

# 设置安装程序使用的 locale（语言+地区），影响界面语言、时区默认值等
d-i debian-installer/locale string en_US.UTF-8

# 或者可拆开单独指定（注释掉上面一行，取消下面三行注释也可）
# d-i debian-installer/language string en
# d-i debian-installer/country string US
# d-i debian-installer/locale string en_US.UTF-8

# 键盘布局：美式英文键盘（us）
d-i keyboard-configuration/xkb-keymap select us


# ========================
# 网络配置
# ========================

# 自动选择网络接口（通常用于单网卡环境）
d-i netcfg/choose_interface select auto

# 若需静态 IP，可取消以下几行注释并修改（此处保持 DHCP）
# d-i netcfg/disable_autoconfig boolean true
# d-i netcfg/get_ipaddress string 192.168.1.100
# d-i netcfg/get_netmask string 255.255.255.0
# d-i netcfg/get_gateway string 192.168.1.1
# d-i netcfg/get_nameservers string 8.8.8.8
# d-i netcfg/confirm_static boolean true

# 主机名和域名
d-i netcfg/get_hostname string debian
d-i netcfg/get_domain string localdomain


# ========================
# 镜像源设置
# ========================

# 不使用国家自动检测，手动指定
d-i mirror/country string manual

# 指定 Debian 官方镜像主机（可替换为清华、阿里等国内镜像加速）
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string   # 无代理留空


# ========================
# 用户与密码
# ========================

# 启用 root 登录
d-i passwd/root-login boolean true

# 设置普通用户全名
d-i passwd/user-fullname string Debian User

# 普通用户名
# d-i passwd/username string debian

# 用户密码（明文！仅用于测试；生产环境建议加密或通过 late_command 修改）
# d-i passwd/user-password password insecure
# d-i passwd/user-password-again password insecure

# root 密码（若启用 root-login，则需设置）
d-i passwd/root-password password debian12
d-i passwd/root-password-again password debian12

# 关键：禁止创建普通用户
d-i passwd/make-user boolean false


# ========================
# 时钟与时区
# ========================

# 系统时钟使用 UTC（推荐）
d-i clock-setup/utc boolean true

# 设置时区（中国用 Asia/Shanghai）
d-i time/zone string Asia/Shanghai


# ========================
# 分区方案（全自动：整盘单分区）
# ========================

# 使用常规分区（非 LVM、非加密）
d-i partman-auto/method string regular

# 选择“原子”方案：所有文件放在一个分区（/）
d-i partman-auto/choose_recipe select atomic

# 确认写入新分区表
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/confirm_write_new_label boolean true

# 确认不覆盖已有数据（即使有也强制继续）
d-i partman/confirm_nooverwrite boolean true

# 选择完成分区（相当于点击“Finish partitioning”）
d-i partman/choose_partition select finish

# 最终确认分区修改
d-i partman/confirm boolean true


# ========================
# 软件包选择
# ========================

# 安装额外软件包（用空格分隔）
d-i pkgsel/include string openssh-server vim curl wget git vnstat

# 升级策略：full-upgrade（安装过程中升级所有包）
d-i pkgsel/upgrades select full-upgrade

# 不参与 popularity-contest（匿名使用统计）
d-i popularity-contest/participate boolean false


# ========================
# 引导加载器（GRUB）
# ========================

# 只安装 Debian 的 GRUB，不探测其他操作系统
d-i grub-installer/only_debian boolean true

# 不安装到多系统环境（设为 false 表示不处理 Windows 等）
d-i grub-installer/with_other_os boolean false

# 默认安装到第一个磁盘（通常为 /dev/sda）
# 如需指定设备，可加：d-i grub-installer/bootdev string /dev/sda


# ========================
# 安装完成行为
# ========================

# 安装完成后自动重启（不等待用户按键）
d-i finish-install/reboot_in_progress note
