<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>liebe.pub</title>
  <meta name="description" content="liebe - love, in German. A space for warmth and connection." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #faf7f4;
      --color-bg-warm: #f5ede6;
      --color-text: #3a3530;
      --color-text-muted: #8a8078;
      --color-accent: #c4977a;
      --color-accent-light: #dfc4b0;
      --color-divider: #e5ddd5;
      --font-serif: 'Cormorant Garamond', 'Georgia', serif;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Background image layer */
    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .bg-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.15;
      filter: saturate(0.6) brightness(1.1);
    }

    /* Main content */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      min-height: 100vh;
    }

    .content {
      text-align: center;
      max-width: 640px;
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }

    /* Title */
    .title {
      font-family: var(--font-serif);
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--color-text);
      margin-bottom: 0.2em;
    }

    .title .dot {
      color: var(--color-accent);
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--color-accent-light);
      margin: 2rem auto;
      animation: expandWidth 1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
      transform: scaleX(0);
    }

    /* Subtitle */
    .subtitle {
      font-family: var(--font-serif);
      font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      color: var(--color-text-muted);
      letter-spacing: 0.04em;
      line-height: 1.8;
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
      opacity: 0;
    }

    /* German meaning */
    .meaning {
      margin-top: 2.5rem;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--color-text-muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
      opacity: 0;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--color-text-muted);
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeIn 1s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
    }

    footer a {
      color: var(--color-text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: var(--color-accent);
    }

    footer .icp {
      margin-top: 0.5rem;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes expandWidth {
      from {
        transform: scaleX(0);
      }
      to {
        transform: scaleX(1);
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      main {
        padding: 2rem 1.5rem;
      }

      .divider {
        width: 36px;
        margin: 1.5rem auto;
      }

      .meaning {
        margin-top: 2rem;
        font-size: 0.7rem;
      }
    }

    /* Subtle floating animation for the dot */
    .dot {
      display: inline-block;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="bg-layer">
    <img src="bg.png" alt="" loading="eager" />
  </div>

  <main>
    <div class="content">
      <h1 class="title">liebe<span class="dot">.</span></h1>
      <div class="divider"></div>
      <p class="subtitle">Liebe ist das Einzige, was wachst,<br />indem wir es verschwenden.</p>
      <p class="meaning">/ liː.bə / &mdash; love, in German</p>
    </div>
  </main>

  <footer>
    <div class="icp">
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">蒙ICP备19005282号-1</a>
    </div>
  </footer>
</body>
</html>
